# =============================================================================
# !!! UNTESTED / SPECULATIVE DRAFT — USE ENTIRELY AT YOUR OWN RISK !!!
# =============================================================================
# This Jandy AquaLink RS AllButton emulator is 100% UNTESTED. It has NEVER been
# verified on physical hardware by anyone. It actively TRANSMITS onto your bus,
# so a wrong guess here can disrupt a live controller. The protocol bytes (in
# particular the AllButton ACK third byte 0x80), device addresses, CRC, and the
# poll-cycle ACK timing (~60 ms, which an ESP under WiFi load may miss) are all
# community reverse-engineering GUESSES that may be wrong. Do not assume any of
# it works. Validate every byte against your own bus captures before enabling
# transmission, and please open an issue with corrections if you test it.
# =============================================================================
#
# Jandy AquaLink RS — Active AllButton Emulator (UNTESTED DRAFT)
#
# Protocol references:
#   - Envelope format (DLE STX <data> <checksum> DLE ETX):
#     https://wiki.jmehan.com/display/KNOW/Jandy+Pool+Heater
#   - AllButton ACK byte sequence and device addressing:
#     https://github.com/earlephilhower/aquaweb/blob/master/protocol.md
#
# This configuration emulates a Jandy AllButton device (simulated keypad) to
# both observe all bus state and send button commands to the controller.
#
# How Jandy AllButton works:
#   The RS controller polls every device address in sequence. When it probes
#   our AllButton address (0x08 by default), we respond with an ACK frame.
#   If we have a command, we include the key byte in the ACK; otherwise we
#   ACK with key=0x00 (no-op). Failing to ACK causes the controller to mark
#   our device as offline. tx.idle_command supplies that ACK, and the component
#   requires a command_format alongside it at config-validation time.
#
#   TX gate: frame_type [0x08, 0x00] fires when the master probes address 0x08
#            (DEST=0x08, CMD_PROBE=0x00). Change it below if your AllButton
#            lives at a different address (0x08..0x0B).
#
# AllButton device addresses: 0x08 to 0x0B (4 possible addresses).
# Use whichever address your controller expects. If unsure, start with the
# passive observer config and watch Last Frame Type for probes to 0x08..0x0B.
#
# UART: 9600 baud, 8N1. Set flow_control_pin on the uart: component to
# switch DE/RE on your RS485 adapter. Under ESP-IDF this uses hardware
# half-duplex mode for precise shift-register-level timing.

esphome:
  name: jandy-allbutton
  friendly_name: Jandy AquaLink Controller

# Required -- fill in your board identifier.
# See https://esphome.io/components/esp32 for the full list.
# ESP-IDF is recommended: it enables hardware RS485 half-duplex mode which
# drives the DE/RE pin with shift-register-level timing. Arduino framework
# users must use an auto-DE transceiver chip (e.g. MAX13487, MAX22025).
esp32:
  board: esp32-s3-devkitc-1    # replace with your variant
  framework:
    type: esp-idf

logger:
  # level: INFO  # DEBUG | INFO | WARN | ERROR | NONE

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Remove this block once rs485_frame is included in an official ESPHome release.
external_components:
  - source: github://b3nj1/esphome@rs485_frame
    components: [rs485_frame]

uart:
  id: pool_uart
  # If you receive no data, try swapping tx_pin and rx_pin. Some adapters
  # label DI/RO from the adapter's perspective, opposite of the device's.
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512
  flow_control_pin: GPIO21    # DE/RE pin on your RS485 adapter
  # Under ESP-IDF this enables hardware half-duplex mode: the UART peripheral
  # asserts DE during TX and deasserts precisely when the shift register empties.

rs485_frame:
  id: pool
  uart_id: pool_uart
  # Explicit AllButton emulation config. UART 9600 8N1 is set in the uart: block above.
  # All of these bytes are UNVERIFIED guesses (see banner).
  # escape: the Jandy DLE-stuffing scheme is itself unverified; escape_byte 0x00 mirrors the
  # Hayward convention and is a guess. If captures show doubled DLEs (10 10), switch to double.
  framing:
    escape:
      mode: escape_byte
      byte: 0x00
  crc:
    type: sum8
    rx_accept: [header_inclusive]
    tx_variant: header_inclusive
  # command_format is required by both the `command:` button shorthand and tx.idle_command.
  # AllButton ACK: preamble [0x00, 0x01, 0x80] + 1-byte command. The 0x80 byte is a guess.
  command_format:
    preamble: [0x00, 0x01, 0x80]
    command_size: 1
  dump_frames: false
  max_frame_length: 256
  tx:
    gate:
      mode: frame_trigger
      # AllButton at address 0x08 + CMD_PROBE 0x00. Change to [0x09, 0x00] .. [0x0B, 0x00]
      # if your AllButton lives at a different address.
      frame_type: [0x08, 0x00]
    idle_command: 0x00         # ACK with key=0x00 on every probe (requires command_format)
    queue_policy: replace_latest
    max_queue_size: 1

  # ---------------------------------------------------------------------------
  # Decode handlers -- identical to passive sniffer config except we now send
  # commands too. One on_frame: per frame type, push to template sensors.
  # ---------------------------------------------------------------------------
  on_frame:
    - frame_type: [0x08, 0x02]
      then:
        - lambda: |-
            if (payload.size() < 7) return;
            id(led_filter_pump).publish_state(bool((payload[2] >> 0) & 1));
            id(led_spa).publish_state(bool((payload[2] >> 2) & 1));
            id(led_aux1).publish_state(bool((payload[2] >> 4) & 1));
            id(led_aux2).publish_state(bool((payload[2] >> 6) & 1));
            id(led_aux3).publish_state(bool((payload[3] >> 0) & 1));
            id(led_pool_heater).publish_state(bool((payload[5] >> 4) & 1));
            id(led_spa_heater).publish_state(bool((payload[6] >> 0) & 1));

    - frame_type: [0x08, 0x03]
      then:
        - lambda: |-
            if (payload.size() < 3) return;
            // BUF_LEN sized generously to cover any AllButton/OneTouch display variant
            // and iAqualinkTouch panels (which send longer message frames). static:
            // BSS-allocated once at program start -- no per-call stack or heap, matching
            // the hub's setup-time buffer discipline.
            const size_t BUF_LEN = 128;
            static char text[BUF_LEN];
            uint8_t tlen = 0;
            for (size_t i = 2; i < payload.size() && tlen < (BUF_LEN - 1); i++) {
              uint8_t b = payload[i];
              if (b == 0 || b == ' ') {
                if (tlen > 0 && text[tlen - 1] != ' ')
                  text[tlen++] = ' ';
              } else if (b >= 0x20 && b < 0x7F) {
                text[tlen++] = char(b);
              }
            }
            while (tlen > 0 && text[tlen - 1] == ' ') tlen--;
            id(pool_display).publish_state(std::string(text, tlen));

    - frame_type: [0x00, 0x16]
      then:
        - lambda: |-
            if (payload.size() < 4) return;
            id(swg_salt_ppm).publish_state(float(payload[2]) * 100.0f);
            uint8_t status = payload[3];
            id(swg_normal).publish_state(status == 0x00);
            id(swg_no_flow).publish_state(bool(status & 0x01));
            id(swg_low_salt).publish_state(bool(status & 0x02));
            id(swg_high_salt).publish_state(bool(status & 0x04));
            id(swg_clean_cell).publish_state(bool(status & 0x08));
            id(swg_low_temp).publish_state(bool(status & 0x40));

    - frame_type: [0x50, 0x11]
      then:
        - lambda: |-
            if (payload.size() < 3) return;
            id(swg_chlorine_output).publish_state(float(payload[2]));

    - frame_type: [0x00, 0x1F]
      then:
        - lambda: |-
            if (payload.size() < 8) return;
            uint16_t watts = (uint16_t(payload[4]) << 8) | payload[5];
            uint16_t rpm = (uint16_t(payload[6]) << 8) | payload[7];
            id(epump_watts).publish_state(float(watts));
            id(epump_rpm).publish_state(float(rpm));

    - frame_type: [0x00, 0x0D]
      then:
        - lambda: |-
            if (payload.size() < 7) return;
            id(heater_error).publish_state(payload[6] == 0x10);

# ---------------------------------------------------------------------------
# Buttons (send commands to controller)
#
# Command value = 32-bit word whose low byte is the Jandy key byte.
# Confirmed key bytes from community reverse-engineering; verify on your system.
# ---------------------------------------------------------------------------

button:
  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Filter Pump"
    command: 0x00000002   # key byte = 0x02

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Spa"
    command: 0x00000001

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Aux 1"
    command: 0x00000005

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Aux 2"
    command: 0x0000000a

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Aux 3"
    command: 0x0000000f

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Aux 4"
    command: 0x00000006   # use 0x14 for RS12/RS16 systems

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Pool Heater"
    command: 0x00000012

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Spa Heater"
    command: 0x00000017

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Hold"
    command: 0x00000019

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Override"
    command: 0x0000001e

# ---------------------------------------------------------------------------
# Template sensors driven by the on_frame: handlers above.
# ---------------------------------------------------------------------------

binary_sensor:
  # LED state mirrors. device_class is set so HA picks the right icon and so
  # status binary sensors don't trigger HA's "missing device_class" warning.
  - platform: template
    id: led_filter_pump
    name: "Filter Pump"
    device_class: running

  - platform: template
    id: led_spa
    name: "Spa"
    device_class: running

  - platform: template
    id: led_aux1
    name: "Aux 1"
    device_class: running

  - platform: template
    id: led_aux2
    name: "Aux 2"
    device_class: running

  - platform: template
    id: led_aux3
    name: "Aux 3"
    device_class: running

  - platform: template
    id: led_pool_heater
    name: "Pool Heater"
    device_class: running

  - platform: template
    id: led_spa_heater
    name: "Spa Heater"
    device_class: running

  # "Normal" is the inverse of every fault below; no HA device_class fits a generic
  # "is everything okay" indicator, so leave undefined.
  - platform: template
    id: swg_normal
    name: "SWG Normal"

  - platform: template
    id: swg_no_flow
    name: "SWG No Flow"
    device_class: problem

  - platform: template
    id: swg_low_salt
    name: "SWG Low Salt"
    device_class: problem

  - platform: template
    id: swg_high_salt
    name: "SWG High Salt"
    device_class: problem

  - platform: template
    id: swg_clean_cell
    name: "SWG Clean Cell"
    device_class: problem

  - platform: template
    id: swg_low_temp
    name: "SWG Low Temp"
    device_class: cold

  - platform: template
    id: heater_error
    name: "Heater Error"
    device_class: problem

text_sensor:
  - platform: template
    id: pool_display
    name: "Pool Display"

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Last Frame Type"

sensor:
  # Template sensors all carry state_class: measurement so HA enables long-term
  # statistics and does not log "missing state_class" warnings at startup.
  - platform: template
    id: swg_salt_ppm
    name: "SWG Salt PPM"
    unit_of_measurement: ppm
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 10s

  - platform: template
    id: swg_chlorine_output
    name: "SWG Chlorine Output"
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 10s

  - platform: template
    id: epump_watts
    name: "ePump Watts"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 5s

  - platform: template
    id: epump_rpm
    name: "ePump RPM"
    unit_of_measurement: RPM
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 5s

  # Diagnostic counters from the rs485_frame sensor platform. state_class,
  # unit_of_measurement, and entity_category (diagnostic) are filled in
  # automatically per decode value.
  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Frames Received"
    decode: frames_received
    filters:
      - throttle: 120s

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "CRC Failures"
    decode: crc_failures

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Commands Sent"
    decode: commands_sent
