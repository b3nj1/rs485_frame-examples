# =============================================================================
# !!! UNTESTED / SPECULATIVE DRAFT — ACTIVELY TRANSMITS — AT YOUR OWN RISK !!!
# =============================================================================
# This config TRANSMITS onto a live bus (see allbutton.yaml / bus.yaml warnings).
# Confirm the bus first with example-passive.yaml. Validate every byte against
# your own captures before flashing this.
# =============================================================================
# Jandy AquaLink RS — example device config: active AllButton emulator (UNTESTED)
# -----------------------------------------------------------------------------
# Status:      UNTESTED-draft
# Tested on:   (none — community reverse-engineering only)
#
# Contributors:
#   - earlephilhower, jmehan wiki contributors
# =============================================================================
#
# HOW TO USE THIS FILE
#   1. Copy and rename it. Fill in all substitutions: below (name, board, GPIO pins).
#   2. allbutton.yaml is REQUIRED here (it turns the hub active). Uncomment the
#      equipment profiles you have and delete the rest.
#   3. Add wifi_ssid / wifi_password to your secrets.yaml.
#   4. If your AllButton lives at an address other than 0x08, change the gate in
#      allbutton.yaml and the frame addresses in leds-display.yaml.

substitutions:
  name: jandy-allbutton
  friendly_name: Jandy AquaLink Controller
  board: BOARDXX             # see https://esphome.io/components/esp32
  tx_pin: GPIOXX             # if no data received, try swapping tx_pin and rx_pin
  rx_pin: GPIOXX
  flow_control_pin: GPIOXX   # DE/RE direction pin; delete this and the uart: line below
                             # if your adapter auto-manages direction
  # Temperature units — passed to bus.yaml decoders.
  temp_unit: "°F"
  temp_unit_short: "F"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: ${board}
  framework:
    type: esp-idf

logger:
api:
ota:
  platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Temporary — tracks the PR branch. Remove once rs485_frame ships in an official ESPHome release.
external_components:
  - source: github://b3nj1/esphome@rs485_frame
    components: [rs485_frame]

# UART — Jandy AquaLink RS: 9600 baud, 8N1; fixed by protocol.
uart:
  - id: pool_uart
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}
    baud_rate: 9600   # Jandy AquaLink RS — do not change
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 512
    flow_control_pin: ${flow_control_pin}

packages:
  rs485:
    url: https://github.com/b3nj1/rs485_frame-examples
    ref: v1.0.1          # PINNED release tag — bump deliberately to update
    refresh: 1d
    files:
      # Bus package is REQUIRED and stays uncommented.
      - jandy/aqualink-rs/bus.yaml
      # AllButton emulator is REQUIRED for this active config (it transmits).
      - jandy/aqualink-rs/allbutton.yaml
      # --- Equipment: uncomment the lines for gear you have, delete the rest. ---
      # - jandy/aqualink-rs/leds-display.yaml    # Panel LEDs + display — Status: UNTESTED
      # - jandy/aqualink-rs/swg.yaml             # Salt chlorinator — Status: UNTESTED
      # - jandy/aqualink-rs/epump.yaml           # Variable-speed ePump — Status: UNTESTED
      # - jandy/aqualink-rs/heater.yaml          # Heater error — Status: UNTESTED
