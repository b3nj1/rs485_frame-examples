# !!! UNTESTED / SPECULATIVE DRAFT — USE ENTIRELY AT YOUR OWN RISK !!!  (see bus.yaml)
# =============================================================================
# Jandy AquaLink RS — example device config: PASSIVE observer (UNTESTED DRAFT)
# -----------------------------------------------------------------------------
# Status:      UNTESTED-draft
# Tested on:   (none — community reverse-engineering only)
#
# Contributors:
#   - earlephilhower, jmehan wiki contributors
# =============================================================================
#
# Passive observer: reads bus state without ever transmitting. Safe to flash on a
# live bus. Use this first to confirm the bus is visible and to catalog frame
# types (set dump_frames: true on the hub during discovery) before trying the
# active AllButton emulator.
#
# HOW TO USE THIS FILE
#   1. Copy and rename it; fill in the substitutions below.
#   2. In packages.rs485.files, uncomment the equipment profiles you have and
#      delete the rest. bus.yaml is REQUIRED. Passive mode never transmits, so
#      no flow_control_pin is needed (tie DE/RE to the receive state).
#   3. Add wifi_ssid / wifi_password to your secrets.yaml.

substitutions:
  name: jandy-observer
  friendly_name: Jandy AquaLink Observer
  board: esp32-s3-devkitc-1   # see https://esphome.io/components/esp32 for the full list
  tx_pin: GPIO17
  rx_pin: GPIO18
  # Temperature units: set to °C / C if in Celsius region
  temp_unit: "°F"
  temp_unit_short: "F"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: ${board}
  framework:
    type: esp-idf

logger:
api:
ota:
  platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Temporary — tracks the PR branch. Remove once rs485_frame ships in an official ESPHome release.
external_components:
  - source: github://b3nj1/esphome@rs485_frame
    components: [rs485_frame]

packages:
  rs485:
    url: https://github.com/b3nj1/rs485_frame-examples
    ref: v1.0.0          # PINNED release tag — bump deliberately to update
    refresh: 1d
    files:
      # Bus package is REQUIRED and stays uncommented.
      - jandy/aqualink-rs/bus.yaml
      # --- Equipment: uncomment the lines for gear you have, delete the rest. ---
      # - jandy/aqualink-rs/leds-display.yaml    # Panel LEDs + display — Status: UNTESTED
      # - jandy/aqualink-rs/swg.yaml             # Salt chlorinator — Status: UNTESTED
      # - jandy/aqualink-rs/epump.yaml           # Variable-speed ePump — Status: UNTESTED
      # - jandy/aqualink-rs/heater.yaml          # Heater error — Status: UNTESTED
