## Skeleton config for an arbitrary DLE-framed RS485 device.
##
## The hub is configured explicitly here: you set the UART baud/parity/stop bits
## yourself and declare every framing/CRC/TX detail in the rs485_frame: block.
## This is the right starting point for any device that you have to
## reverse-engineer from scratch.
##
## What you must supply:
##   - uart: baud rate / parity / stop bits that match your target device
##   - rs485_frame.crc.type: the CRC algorithm your device uses (sum8, sum16,
##     xor8, crc16_modbus, or none)
##   - rs485_frame.tx.gate: how the bus gates writes (frame_trigger with a known
##     keep-alive frame_type, idle_gap, or fixed_delay)
##   - The frame_type and payload bytes for each command you want to send,
##     captured from a real controller via dump_frames + sniffer_stats first
##
## All transmissions go through the raw `frame_type:` + `payload:` form on
## buttons, or the `rs485_frame.send_frame` action when bytes are computed at
## runtime. No command_format is configured below, so the `command:` shorthand
## on buttons is unavailable — add a `command_format:` block to the hub if your
## device has a regular structure (preamble + command bytes + postamble) and you
## want that shorthand.

esphome:
  name: rs485-generic
  friendly_name: RS485 Generic

esp32:
  board: esp32-s3-devkitc-1    # replace with your variant
  framework:
    type: esp-idf

logger:
  level: INFO

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Temporary -- tracks the PR branch. Update the ref to @dev once merged;
# remove this block entirely once included in an official ESPHome release.
external_components:
  - source: github://b3nj1/esphome@rs485_frame
    components: [rs485_frame]

uart:
  id: bus_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  # Replace these with the actual settings of your target device. Common
  # values for industrial RS485 buses include 9600, 19200, 38400, 57600,
  # and 115200; 8N1 is the most common framing.
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512
  flow_control_pin: GPIO21    # DE/RE direction pin on half-duplex adapters

rs485_frame:
  - id: bus
    uart_id: bus_uart
    # framing.escape is required (no default). Two schemes for stuffing a literal DLE in the
    # payload: mode: double (DLE DLE, the common convention) or mode: escape_byte with a
    # marker byte (DLE + byte, as Hayward uses). dle/stx/etx default to 0x10/0x02/0x03;
    # override them here if your device uses different delimiter bytes.
    framing:
      escape:
        mode: double              # ⮕ or: mode: escape_byte + byte: 0xNN — verify from captures
    # No command_format set: the `command:` form on the button platform is rejected,
    # forcing all transmissions through raw frame_type+payload. Add command_format:
    # here if your device has a regular structure (preamble + command bytes + postamble)
    # and you want to use the `command:` shorthand on buttons.
    dump_frames: true             # ⮕ logs every validated RX frame; turn off in production
    crc:
      type: crc16_modbus          # ⮕ replace with your device's CRC
      tx_variant: payload_only    # ⮕ payload_only or header_inclusive — verify from captures
    tx:
      gate:
        # idle_gap is the safest default for an unknown bus: transmit once the
        # bus has been silent for min_silence. Switch to frame_trigger with an
        # explicit gate.frame_type if you know your device's keep-alive frame.
        mode: idle_gap
        min_silence: 10ms
      queue_policy: replace_latest
      max_queue_size: 1
    # sniffer_stats is the fastest way to discover frame types and their
    # cadence on a new bus. Press buttons on the controller, dump the table,
    # use the hex+ASCII payloads to identify each frame_type, then write
    # on_frame: decoders below. Remove this block once your decoders are
    # written; it adds ~5 KB of code and a periodic log dump.
    sniffer_stats:
      interval: 30s
      max_frame_types: 32
      max_unique_payloads: 16
      payload_capture_bytes: 64
      payload_dump_top: 4
    on_frame:
      # Replace this with the decoder(s) for your device. The example below is
      # a placeholder — match on whatever frame_type your device emits for
      # status updates, then publish to template sensors. payload[0..N-1] is
      # the frame_type itself; data starts at payload[N].
      - frame_type: [0x01, 0x02]
        then:
          - lambda: |-
              if (payload.size() < 4) return;
              uint16_t value = (uint16_t(payload[2]) << 8) | uint16_t(payload[3]);
              id(example_value).publish_state(float(value));

sensor:
  - platform: rs485_frame
    rs485_frame_id: bus
    name: "Frames Received"
    decode: frames_received

  - platform: rs485_frame
    rs485_frame_id: bus
    name: "CRC Failures"
    decode: crc_failures

  - platform: rs485_frame
    rs485_frame_id: bus
    name: "Commands Sent"
    decode: commands_sent

  - platform: rs485_frame
    rs485_frame_id: bus
    name: "Queue Depth"
    decode: queue_depth

  - platform: template
    id: example_value
    name: "Example Value"
    state_class: measurement
    accuracy_decimals: 0

text_sensor:
  - platform: rs485_frame
    rs485_frame_id: bus
    name: "Last Frame Type"

number:
  # Template entity feeding the "Apply Setpoint" button below — its current
  # value gets serialized into the outgoing frame's payload at press time.
  - platform: template
    id: setpoint
    name: "Setpoint"
    min_value: 0
    max_value: 255
    step: 1
    optimistic: true
    initial_value: 0

button:
  # Raw form: replace frame_type and payload with bytes captured from a real
  # controller. The hub adds DLE-STX/ETX wrapping, byte-stuffing, and CRC; the
  # bytes below go on the wire verbatim in between.
  - platform: rs485_frame
    rs485_frame_id: bus
    name: "Send Command A"
    frame_type: [0x00, 0xA1]
    payload: [0x01, 0x00, 0x55]

  - platform: rs485_frame
    rs485_frame_id: bus
    name: "Send Command B"
    frame_type: [0x00, 0xA1]
    payload: [0x01, 0x00, 0xAA]

  # Computed-payload button: a template button + the rs485_frame.send_frame
  # action. The payload bytes are built from runtime state inside the lambda,
  # so the same action can drive setpoints, indices, or anything else that
  # varies. Useful when you need a per-press value that a fixed payload can't
  # capture.
  - platform: template
    name: "Apply Setpoint"
    on_press:
      - rs485_frame.send_frame:
          id: bus
          frame_type: [0x00, 0xA2]
          payload: !lambda |-
            return std::vector<uint8_t>{
              0x42, 0x00, static_cast<uint8_t>(id(setpoint).state),
            };
