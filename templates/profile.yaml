#
# Equipment profile skeleton. Copy to <vendor>/<controller-family>/<name>.yaml.
# An equipment profile is keyed on the frame_type(s) it OWNS (either direction).
# It adds to the shared hub via `id: !extend <hub_id>` and ships only its own
# decoders + entities. It MUST NOT define uart/framing/crc/secrets — those live in
# bus.yaml. The hub fires EVERY on_frame handler whose prefix matches, so multiple
# profiles can decode the same frame type: register one handler per profile and
# guard only your own bytes/bits. See CONTRIBUTING.md.

rs485_frame:
  - id: !extend <hub_id>      # MUST match the hub id declared in bus.yaml
    on_frame:
      - frame_type: [0x00, 0x00]   # TODO: the frame_type this profile owns
        then:
          - lambda: |-
              // Decoder best practices: guard payload.size(), no heap allocation
              // (use stack/static buffers), build one std::string only at publish.
              if (payload.size() < 3) return;
              id(example_value).publish_state(float(payload[2]));

sensor:
  - platform: template
    id: example_value
    name: "Example Value"
    state_class: measurement
    accuracy_decimals: 0

