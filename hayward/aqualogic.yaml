  #  command: 0x00000008

binary_sensor:
  # LED state sensors. These receive their values from the on_frame: [0x01, 0x02]
  # handler above -- no per-sensor lambda needed. device_class is set for each so
  # HA picks an appropriate default icon and the entity carries the right semantics
  # (avoids HA's "missing device_class" warning for status binary sensors).
  - platform: template
    id: led_filter
    name: "Filter"
    device_class: running

  - platform: template
    id: led_lights
    name: "Lights"
    device_class: light

  - platform: template
    id: led_aux1
    name: "AUX 1"  # Rename to match your AUX 1 load
    device_class: running

  - platform: template
    id: led_aux2
    name: "AUX 2"  # Rename to match your AUX 2 load
    device_class: running

  - platform: template
    id: led_pool_mode
    name: "Pool Mode"
    device_class: running

  - platform: template
    id: led_spa_mode
    name: "Spa Mode"
    device_class: running

  - platform: template
    id: led_heater
    name: "Heater"
    device_class: heat
    # True when the heater is actively heating. Distinct from heater mode
    # (Auto / Manual Off), which is visible only on the display.

  - platform: template
    id: led_check
    name: "Check System"
    device_class: problem

  # Heater mode (Auto vs. Manual Off) is not in the LED frame. It is latched
  # and timed out by the on_frame: [0x01, 0x03] handler above.
  - platform: template
    id: heater_auto
    name: "Heater Auto Mode"
    device_class: heat

text_sensor:
  # Display text sensors receive values from the on_frame: [0x01, 0x03] handler.
  - platform: template
    id: display_text
    name: "Display"

  - platform: template
    id: display_blink
    name: "Display Blink"
    # Non-empty string when any character on the display is blinking.
    # Automations can trigger on state != "" to detect alarms or mode changes.

  # "Last Frame Type" is useful for debugging unexpected bus activity. Publishes
  # the type of the most recently validated frame as a 4-char hex string ("0103" etc.).
  #- platform: rs485_frame
  #  rs485_frame_id: pool
  #  name: "Last Frame Type"

sensor:
  # Temperature and VSP sensors receive values from the on_frame: handlers above.
  # state_class: measurement is required by HA for long-term statistics on gauge
  # readings; without it HA logs a "missing state_class" warning at startup.
  - platform: template
    id: pool_temp
    name: "Pool Temperature"
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 10s

  - platform: template
    id: air_temp
    name: "Air Temperature"
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 10s

  - platform: template
    id: vsp_speed
    name: "VSP Commanded Speed"
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 1s

  - platform: template
    id: vsp_power
    name: "VSP Power"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 0
    filters:
      - throttle: 1s

  # Diagnostic counters from the rs485_frame sensor platform. state_class,
  # unit_of_measurement, and entity_category (diagnostic) are filled in
  # automatically per decode value, so the entries below need no extra YAML.
  #- platform: rs485_frame
  #  rs485_frame_id: pool
  #  name: "Frames Received"
  #  decode: frames_received

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "CRC Failures"
    decode: crc_failures

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Command Drops"
    decode: command_drops
