esphome:
  name: aqualogic-sniffer
  friendly_name: AquaLogic Sniffer

# Required -- fill in your board identifier.
# See https://esphome.io/components/esp32 for the full list.
# Sniffer mode never transmits, so framework choice is less critical here,
# but ESP-IDF is recommended for consistency with the full config.
esp32:
  board: esp32-s3-devkitc-1    # replace with your variant
  framework:
    type: esp-idf

logger:
  level: INFO                 # keep INFO so the stats log without dump_frames noise

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Remove this block once rs485_frame is included in an official ESPHome release.
external_components:
  - source: github://b3nj1/esphome@rs485_frame
    components: [rs485_frame]

uart:
  id: pool_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 2
  rx_buffer_size: 512
  flow_control_pin: GPIO21    # omit if your adapter auto-manages direction

rs485_frame:
  id: pool
  uart_id: pool_uart
  framing:
    escape:
      mode: escape_byte   # Hayward stuffs a literal DLE as DLE + the byte below
      byte: 0x00
  # Hayward AquaLogic uses sum16 (header-inclusive) CRC. Frames that fail it are counted
  # in crc_failures rather than logged. To capture a completely unknown bus instead (log
  # everything, including malformed frames), set crc.type to none.
  crc:
    type: sum16
  # sniffer_only hubs never transmit, so no tx.gate.frame_type is needed.
  # dump_frames logs every validated frame as raw hex at DEBUG; useful when you want a
  # full byte stream, but with sniffer_stats below the periodic table is usually all you
  # need. Flip to true if you want the firehose too.
  dump_frames: false
  sniffer_only: true

  # Periodic stats table: one row per frame type with arrival cadence (since-ref and
  # since-same-type) and a per-frame-type unique-payload count + hex/ASCII dump. Every
  # interval the table prints and the per-period counters reset, so each window is an
  # independent capture session — press one set of buttons, copy the stats, press a
  # different set in the next window, etc., without rebooting the ESP.
  sniffer_stats:
    interval: 30s
    # max_frame_types: bumped to the cap since Hayward usually shows fewer than 10 but
    # we want headroom to catch anything new (e.g. button-press frames at 0x00 0x83).
    max_frame_types: 32
    # Distinct payloads remembered per frame_type per period. Display frames cycle through
    # many screens (~10–20); 24 lets the period capture most of one rotation before
    # spilling into +overflow.
    max_unique_payloads: 24
    # Capture more bytes per payload than the 32-byte default: Hayward display frames run
    # ~32 bytes and we want to see the whole thing in the hex+ASCII dump.
    payload_capture_bytes: 48
    # Dump hex+ASCII for the top N frame types by count after each table.
    payload_dump_top: 8
    # reference_frame_type defaults to tx.gate.frame_type ([0x01, 0x01] keep-alive for
    # Hayward); explicit here for clarity and so you can swap the reference if you start
    # looking for cadence relative to a different anchor.
    reference_frame_type: [0x01, 0x01]

  # Decode the Hayward display frame (0x01 0x03) into the display_text template sensor.
  # Encoding: bit 7 of each byte = blink flag; '_' = degree symbol (UTF-8).
  # Stack buffer keeps the hot path heap-free; one std::string is allocated only at publish.
  on_frame:
    - frame_type: [0x01, 0x03]
      then:
        - lambda: |-
            // BUF_LEN covers Hayward Pro Logic's widest displays plus UTF-8 degree-symbol
            // expansion. static: BSS-allocated once at program start -- no per-call stack
            // or heap, matching the hub's setup-time buffer discipline.
            const size_t BUF_LEN = 128;
            static char text[BUF_LEN];
            uint8_t tlen = 0;
            for (size_t i = 3; i < payload.size() && tlen < (BUF_LEN - 2); i++) {
              uint8_t b = payload[i];
              if (b > 0x7F) b -= 0x80;
              if (b < 0x20 || b > 0x7E) continue;
              if (b == '_') {
                if (tlen + 2 <= (BUF_LEN - 2)) { text[tlen++] = '\xC2'; text[tlen++] = '\xB0'; }
              } else {
                text[tlen++] = char(b);
              }
            }
            while (tlen > 0 && text[tlen - 1] == ' ') tlen--;
            id(display_text).publish_state(std::string(text, tlen));

text_sensor:
  # Hub diagnostic: most recent validated frame type ("0103" etc.). Publishes on change only.
  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Last Frame Type"

  - platform: template
    id: display_text
    name: "Pool Display"

sensor:
  # Diagnostic counters publish on change so no throttle filter is needed.
  # The rs485_frame sensor platform supplies state_class, unit_of_measurement,
  # and entity_category (diagnostic) per decode value automatically — no extra
  # YAML required to satisfy HA's long-term statistics rules.
  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Frames Received"
    decode: frames_received

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "CRC Failures"
    decode: crc_failures

  - platform: rs485_frame
    rs485_frame_id: pool
    name: "Keepalive Interval"
    decode: last_keepalive_ms
