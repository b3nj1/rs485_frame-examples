# =============================================================================
# Hayward AquaLogic / ProLogic — example device config
# -----------------------------------------------------------------------------
# Status:      tested-on-hardware
# Tested on:   Hayward AquaLogic / ProLogic; ESP32-S3 (Waveshare ESP32-S3-RS485-CAN)
#
# Contributors:
#   - b3nj1 (@b3nj1)
# =============================================================================
#
# HOW TO USE THIS FILE
#   1. Copy it to your ESPHome configuration directory and rename it (the name
#      becomes your device's hostname).
#   2. Fill in the substitutions: below (board, GPIO pins, transmit role).
#   3. In the packages.rs485.files list, UNCOMMENT the equipment and LEDs you
#      have and DELETE the rest. The bus.yaml line is REQUIRED — leave it
#      uncommented.
#   4. Add wifi_ssid / wifi_password to your secrets.yaml (remote packages cannot
#      contain !secret, so wifi/api/ota stay in this file).
#   5. Flash. Start with hayward/sniffer.yaml first if you want to confirm the
#      bus is visible before sending commands.
#
# To update to a newer release, bump packages.rs485.ref to a newer tag. To edit a
# decoder, copy the package files locally and switch to local !include (see README).

substitutions:
  name: aqualogic
  friendly_name: AquaLogic
  board: esp32-s3-devkitc-1   # see https://esphome.io/components/esp32 for the full list
  tx_pin: GPIO17
  rx_pin: GPIO18
  flow_control_pin: GPIO21
  # Transmit role — change the TWO lines below together (preamble + postamble):
  #   Wireless (recommended, never collides with main panel):
  #     cmd_preamble: "[0x00, 0x83, 0x01]"   cmd_postamble: "[0x00]"
  #   Wired remote (frame type 0x0003):
  #     cmd_preamble: "[0x00, 0x03]"           cmd_postamble: "[]"
  #   Wired local / main panel (frame type 0x0002, collision risk):
  #     cmd_preamble: "[0x00, 0x02]"           cmd_postamble: "[]"
  cmd_preamble: "[0x00, 0x83, 0x01]"   # wireless default
  cmd_postamble: "[0x00]"              # wireless trailing pad; wired uses []
  # cmd_size / cmd_endian / cmd_repeat: leave at bus.yaml defaults (4, big, 2)
  # unless you have a custom protocol.
  # Temperature units: set to °C / C if in Celsius region
  temp_unit: "°F"
  temp_unit_short: "F"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

# ESP-IDF is recommended: it enables hardware RS485 half-duplex mode on the UART
# peripheral, driving the DE/RE direction pin at the shift-register level without
# software guard times. Arduino-framework users must use an auto-DE transceiver
# chip (e.g. MAX13487, MAX22025) instead.
esp32:
  board: ${board}
  framework:
    type: esp-idf

logger:
api:
ota:
  platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

packages:
  rs485:
    url: https://github.com/b3nj1/rs485_frame-examples
    ref: v1.0.0          # PINNED release tag — bump deliberately to update (see README)
    refresh: 1d
    files:
      # Bus package is REQUIRED and stays uncommented.
      - hayward/aqualogic/bus.yaml

      # --- Equipment: uncomment the lines for gear you have, delete the rest. ---
      # - hayward/aqualogic/pump-vsp.yaml        # Variable-speed pump — Status: tested
      # - hayward/aqualogic/heater.yaml          # Gas/heat-pump heater — Status: tested

      # --- LED indicators — uncomment and rename the bits your system exposes. ---
      # Use the "LED Mask" diagnostic sensor to discover bit layout without a sniffer.
      # Bit assignments verified on AquaLogic / ProLogic hardware:
      - path: hayward/aqualogic/led.yaml
        vars: { bit: 0, led_name: "Heater Active", device_class: heat }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 2, led_name: "Check System", device_class: problem }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 3, led_name: "Pool Mode", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 4, led_name: "Spa Mode", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 5, led_name: "Filter", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 6, led_name: "Lights", device_class: light }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 7, led_name: "AUX 1", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 8, led_name: "AUX 2", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 9, led_name: "AUX 3", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 10, led_name: "AUX 4", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 11, led_name: "AUX 5", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 12, led_name: "AUX 6", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 13, led_name: "AUX 7", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 14, led_name: "AUX 8", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 15, led_name: "AUX 9", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 16, led_name: "System Off", device_class: problem }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 19, led_name: "Valve 3", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 20, led_name: "Valve 4", device_class: running }
      # - path: hayward/aqualogic/led.yaml
      #   vars: { bit: 21, led_name: "Service", device_class: running, disabled_by_default: "true" }

      # --- Buttons: uses the hub's cmd_preamble role by default. ---
      # System Off must always use the wireless preamble; see inline definition below.
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Filter", button_command: "0x80000000" }
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Pool Spa Mode", button_command: "0x40000000" }
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Plus", button_command: "0x20000000" }
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Minus", button_command: "0x10000000" }
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Menu", button_command: "0x02000000" }
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Right", button_command: "0x01000000" }
      - path: hayward/aqualogic/button.yaml
        vars: { button_name: "Left", button_command: "0x04000000" }
      # Service — wired preamble only. Uncomment if your panel has a Service button.
      # - path: hayward/aqualogic/button.yaml
      #   vars: { button_name: "Service", button_command: "0x00000008", disabled_by_default: "true" }
      # AUX relays — one entry per channel. Rename label to match your load.
      # AUX 1-12 tested on hardware; higher numbers from community reverse-engineering.
      # - path: hayward/aqualogic/button.yaml
      #   vars: { button_name: "AUX 1", button_command: "0x00020000" }
      # - path: hayward/aqualogic/button.yaml
      #   vars: { button_name: "AUX 2", button_command: "0x00040000" }
      # - path: hayward/aqualogic/button.yaml
      #   vars: { button_name: "AUX 3", button_command: "0x00000800" }

# System Off always uses the wireless preamble regardless of hub role, because the
# wired protocol's System Off command behaves differently on some panels. Define it
# inline with an explicit command_format: so it always sends the wireless encoding.
button:
  - platform: rs485_frame
    rs485_frame_id: pool
    name: "System Off"
    command: 0x08000000
    command_format:
      preamble: [0x00, 0x83, 0x01]
      command_size: 4
      command_endian: big
      command_repeat: 2
      postamble: [0x00]
