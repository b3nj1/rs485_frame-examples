# =============================================================================
# Hayward AquaLogic / ProLogic — equipment profile: valve switch (template)
# -----------------------------------------------------------------------------
# Status:      tested-on-hardware
# Tested on:   Hayward AquaLogic / ProLogic; ESP32-S3; ESPHome 2026.6.0-dev;
#              rs485_frame @ github://b3nj1/esphome@rs485_frame
# Bus:         19200 baud, 8N2  (see bus.yaml)
# Owns frames: [0x01,0x02] one LED bit per valve; one command per valve
# Offsets:     payload-relative — payload[0..1] = frame_type, data starts at payload[2]
# References:  https://github.com/swilson/aqualogic
#
# Contributors:
#   - b3nj1 (@b3nj1) — capture, decode, packaging
#   - swilson (https://github.com/swilson/aqualogic) — reverse-engineering
# =============================================================================
#
# ONE valve switch, parameterized via vars. Include it once per valve you have,
# each with its own vars. It adds to the shared `pool` hub via `id: !extend pool`.
#
# Required vars:
#   n     — channel identifier (must be unique; forms entity id valve_${n}_on)
#   label — entity name shown in Home Assistant (e.g. "Solar Valve", "Spa Valve")
#   cmd   — 32-bit command word that toggles this valve (e.g. "0x00000100")
#   bit   — LED bit position in the [0x01,0x02] mask (0-31)
#
# Optional vars:
#   device_class — Home Assistant device class (default: "running")
#
# Known valve map (from reverse-engineering):
#   { n: 3, label: "Valve 3",  cmd: "0x00000100", bit: 19 }
#   { n: 4, label: "Valve 4",  cmd: "0x00000200", bit: 20 }
#
# Remote git form (in the device config's files: list):
#   - path: hayward/aqualogic/valve.yaml
#     vars: { n: 3, label: "Solar Valve", cmd: "0x00000100", bit: 19 }
# Local-copy form:
#   valve3: !include { file: valve.yaml, vars: { n: 3, label: "Solar Valve", cmd: "0x00000100", bit: 19 } }

defaults:
  n: 3
  label: "Valve 3"
  cmd: "0x00000100"
  bit: 19
  device_class: running

rs485_frame:
  - id: !extend pool
    on_frame:
      - frame_type: [0x01, 0x02]
        then:
          - lambda: |-
              if (payload.size() < 6) return;
              uint32_t mask = uint32_t(payload[2]) | (uint32_t(payload[3]) << 8) |
                              (uint32_t(payload[4]) << 16) | (uint32_t(payload[5]) << 24);
              id(valve_${n}_on).publish_state(bool(mask & (1UL << ${bit})));

button:
  - platform: rs485_frame
    rs485_frame_id: pool
    name: "${label}"
    command: ${cmd}

binary_sensor:
  - platform: template
    id: valve_${n}_on
    name: "${label}"
    device_class: ${device_class}
