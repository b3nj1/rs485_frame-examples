# =============================================================================
# Hayward AquaLogic / ProLogic — per-LED binary sensor package
# -----------------------------------------------------------------------------
# Include once per bit you want to expose in Home Assistant.
# The lambda reads g_led_mask (updated by bus.yaml on every [0x01,0x02] frame)
# and polls it every 250 ms — no on_frame extension or explicit id: needed.
#
# Required vars:
#   bit          Bit position in the 32-bit LED mask (0-31).
#   led_name     Friendly name shown in Home Assistant.
#
# Optional vars:
#   device_class        HA device class (default: running).
#   disabled_by_default Whether to hide the entity in HA by default (default: "false").
#
# Known bit assignments (confirmed: swilson, smith288, ChaseDurand; proj hw-tested 0-8):
#   0  Heater Active     6  Lights      13  AUX 6      20  AUX 10
#   1  Valve 3           7  AUX 1       14  Valve 4    21  AUX 11
#   2  Check System      8  AUX 2       15  Spillover  22  AUX 12
#   3  Pool Mode         9  Service     16  System Off 23  AUX 13
#   4  Spa Mode         10  AUX 3       17  AUX 7      24  AUX 14
#   5  Filter*          11  AUX 4       18  AUX 8      25  Super Chlorinate
#                       12  AUX 5       19  AUX 9
# * bit 5 flashing (second 4-byte LE word in the LED frame) = pump running at low speed
#
# Use the "LED Mask" diagnostic text sensor in bus.yaml to discover your
# system's bit layout without a sniffer.
# =============================================================================

defaults:
  bit: 0
  led_name: "LED 0"
  device_class: running
  disabled_by_default: "false"

binary_sensor:
  - platform: template
    id: led_bit_${bit}
    name: "${led_name}"
    device_class: ${device_class}
    disabled_by_default: ${disabled_by_default}

interval:
  - interval: 100ms
    then:
      - lambda: "id(led_bit_${bit})->publish_state(bool(id(g_led_mask) & (1UL << ${bit})));"
